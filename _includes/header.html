<header class="site-header">
  <div class="site-header__inner">
    <a class="site-brand" href="{{ site.baseurl }}/" aria-label="{{ site.title }}">
      <span class="site-brand__mark">SX</span>
      <span class="site-brand__text">
        <strong>{{ site.author }}</strong>
        <small><span class="lang-en">{{ site.lab_alias_en }}</span><span class="lang-zh">{{ site.lab_alias_zh }}</span></small>
      </span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      {% assign pages = site.pages | sort: "rank" %}
      {% for p in pages %}
        {% if p.title and p.toggle %}
          <a class="page-link" href="{{ p.url | prepend: site.baseurl }}">
            <span class="lang-en">{{ p.title }}</span><span class="lang-zh">{{ p.title_zh | default: p.title }}</span>
          </a>
        {% endif %}
      {% endfor %}
      <a class="page-link page-link--external" href="{{ site.faculty_url }}"><span class="lang-en">HFUT Faculty</span><span class="lang-zh">教师主页</span></a>
      <button class="language-toggle" type="button" data-language-toggle aria-label="Switch language">中文</button>
    </nav>
  </div>
</header>
