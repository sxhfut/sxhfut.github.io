name: Sync Curated Frontier Items

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-frontier-radar
  cancel-in-progress: false

jobs:
  sync-frontiers-manual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync curated frontier items
        run: python scripts/sync_frontiers_manual.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- _data/frontiers.json; then
            echo "No curated frontier updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/frontiers.json
          git commit -m "Sync curated frontier items"
          git push
