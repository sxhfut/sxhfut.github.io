name: Update Frontier Radar

on:
  schedule:
    # 06:25 Beijing time. GitHub Actions schedules use UTC.
    - cron: "25 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-frontier-radar
  cancel-in-progress: false

jobs:
  update-frontiers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare Last30Days skill
        run: |
          git clone --depth 1 https://github.com/mvanhorn/last30days-skill.git /tmp/last30days-skill || true

      - name: Fetch frontier metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LAST30DAYS_SKILL_ROOT: /tmp/last30days-skill/skills/last30days
          LAST30DAYS_MAX_TOPICS: "4"
          LAST30DAYS_ITEMS_PER_TOPIC: "2"
          LAST30DAYS_SOURCES: reddit,hn,polymarket,github
        run: python scripts/update_frontiers.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- _data/frontiers.json; then
            echo "No frontier updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/frontiers.json
          git commit -m "Update frontier radar data"
          git push
