- date: "2026-07-13"
  label: "Public Communication"
  label_zh: "公众号"
  title: "Lab official account “Let AI Understand People” released"
  title_zh: "实验室公众号“让AI更懂人”发布"
  summary: "MAC-Lab opened a public communication channel under the name “Let AI Understand People”, sharing research progress, student training, platform development, and real-world applications around affective computing and psychological computing."
  summary_zh: "MAC-Lab 公众号“让AI更懂人”今天发布。后续将围绕情感计算、心理计算、具身情感智能、学生培养、平台建设和真实场景 AI 应用，持续记录实验室的研究与成长。"
  url: "/news/"
- date: "2026-06-22"
  label: "Publications"
  label_zh: "论文成果"
  title: "Recent publications highlighted in newsroom and radar"
  title_zh: "近期论文成果进入新闻页与前沿雷达"
  summary: "The newsroom and frontier radar now highlight recent works in IEEE/ACM TASLP, IEEE TAI, IEEE TFS, IEEE TAC, IEEE TCSS, EMNLP, ICASSP, and IPMLP, reinforcing MAC-Lab's route in AI + psychology, affective NLP, empathetic dialogue, and multimodal affective perception."
  summary_zh: "新闻页与前沿雷达新增 IEEE/ACM TASLP、IEEE TAI、IEEE TFS、IEEE TAC、IEEE TCSS、EMNLP、ICASSP 和 IPMLP 等近期成果，集中呈现 MAC-Lab 在 AI + 心理、情感 NLP、共情对话与多模态情感感知方向的研究主线。"
  url: "/news/"
- date: "2026-05-29"
