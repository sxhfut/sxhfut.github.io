---
layout: default
---
<article class="post">
  <header class="page-hero page-hero--compact">
    <div class="container">
      <h1><span class="lang-en">{{ page.title }}</span><span class="lang-zh">{{ page.title_zh | default: page.title }}</span></h1>
      {% if page.description %}
        <p><span class="lang-en">{{ page.description }}</span><span class="lang-zh">{{ page.description_zh | default: page.description }}</span></p>
      {% endif %}
    </div>
  </header>

  <div class="page-section">
    <div class="container">
      {{ content }}
    </div>
  </div>
</article>
