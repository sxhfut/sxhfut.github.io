<!DOCTYPE html>
<html lang="zh-CN" class="lang-zh-active">
  <head>
    {% include head.html %}
    {% seo %}
  </head>
  <body class="{% if page.body_class %}{{ page.body_class }}{% endif %}">

    {% include header.html %}

    <main class="page-content">
      {{ content }}
    </main>

    {% include footer.html %}

    <script>
      (function () {
        var button = document.querySelector("[data-language-toggle]");
        var controller = window.MACLAB_LANGUAGE || {};
        var key = controller.key || "maclab-language";

        function applyDocumentLanguage(lang) {
          var isZh = lang === "zh";
          document.documentElement.lang = isZh ? "zh-CN" : "en";
          document.documentElement.classList.toggle("lang-zh-active", isZh);
          document.body.classList.toggle("lang-zh-active", isZh);
          if (button) {
            button.textContent = isZh ? "EN" : "中文";
          }
        }

        function setLanguage(lang, persist) {
          applyDocumentLanguage(lang);
          if (!persist) return;
          try {
            window.localStorage.setItem(key, lang);
          } catch (error) {}
        }

        var active = controller.initialLanguage || "zh";
        try {
          active = window.localStorage.getItem(key) || active;
        } catch (error) {}
        applyDocumentLanguage(active);

        if (button) {
          button.addEventListener("click", function () {
            setLanguage(document.body.classList.contains("lang-zh-active") ? "en" : "zh", true);
          });
        }
      })();
    </script>

    {% include analytics.html %}

  </body>

</html>
